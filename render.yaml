services:
  - type: web
    name: influencer-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/InfluencerAPI/Dockerfile
    dockerContext: ./backend/InfluencerAPI
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MongoDB__ConnectionString
        sync: false  # Set this in Render dashboard
      - key: Jwt__SecretKey
        sync: false  # Set this in Render dashboard
      - key: Cors__AllowedOrigins__0
        value: https://your-app.vercel.app
